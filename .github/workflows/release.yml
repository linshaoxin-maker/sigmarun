name: release

# Publishes to npm when a version tag is pushed. Prepare the tag with
# `node scripts/release-prepare.mjs <bump>` (bumps versions + cuts the CHANGELOG),
# commit, then `git tag vX.Y.Z && git push --follow-tags`.
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance (--provenance)
    steps:
      - uses: actions/checkout@v4

      # No registry-url: setup-node would write an .npmrc with _authToken=${NODE_AUTH_TOKEN} —
      # with that env gone it leaves an EMPTY token config, and npm then takes the token path
      # instead of attempting the trusted-publishing OIDC exchange. Runner default registry is
      # already registry.npmjs.org.
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # Trusted Publishing needs npm >= 11.5.1 (the OIDC token exchange); node 22 bundles npm 10.x,
      # which silently skips OIDC and publishes unauthenticated -> E404. Pinned to 11.x: the
      # known-good trusted-publishing line — npm@12 (days old) still ENEEDAUTHed here.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@11 && npm --version

      - name: Guard — tag must match package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      - run: npm ci
      - run: npm run build
      - run: npx vitest run

      - name: Assemble the publishable package
        run: npm run release

      # Publishes straight to `latest`. The original pre-1.0 next->promote flow died with npm's
      # 2FA-bypass restrictions: dist-tag writes now 403 from interactive sessions and the legacy
      # NPM_TOKEN is revoked — only the OIDC trusted-publishing path (npm publish) still works,
      # so the release itself must set `latest`. Gate quality BEFORE tagging (test + smoke).
      # Auth = npm Trusted Publishing (OIDC): the package's npmjs settings pin this repo+workflow
      # as the publisher, so no npm token exists anywhere in CI. (The legacy NPM_TOKEN was revoked
      # in npm's 2FA-bypass cleanup — its presence would even override OIDC, so keep env empty.)
      - name: Publish to npm with provenance
        run: npm publish --access public --provenance --loglevel http
        working-directory: release
